name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint and Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        # Node.js 20.x test runner has a known intermittent IPC deserialization bug
        # See: https://github.com/nodejs/node/issues/34797
        # We retry tests up to 3 times to handle this flaky issue
        run: |
          for i in 1 2 3; do
            echo "Test attempt $i..."
            if npm test; then
              echo "Tests passed on attempt $i"
              exit 0
            fi
            if [ $i -eq 3 ]; then
              echo "Tests failed after 3 attempts"
              exit 1
            fi
            echo "Tests failed on attempt $i, retrying..."
            sleep 2
          done

  check:
    name: Full Check
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full check with retry
        # Node.js 20.x test runner has a known intermittent IPC deserialization bug
        # See: https://github.com/nodejs/node/issues/34797
        # We retry tests up to 3 times to handle this flaky issue
        run: |
          npm run lint
          for i in 1 2 3; do
            echo "Test attempt $i..."
            if npm test; then
              echo "Tests passed on attempt $i"
              break
            fi
            if [ $i -eq 3 ]; then
              echo "Tests failed after 3 attempts"
              exit 1
            fi
            echo "Tests failed on attempt $i, retrying..."
            sleep 2
          done
          node src/apply.mjs --help > /dev/null
          node -c src/inbrowser-clicks.js
